services:
  db:
    image: postgres:15
    container_name: dndne_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: ./backend
    container_name: dndne_backend
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      - db
volumes:
  pgdata: