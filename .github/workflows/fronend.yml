name: Frontend CI

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master, development]

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint
        run: npx eslint . --ext .js,.jsx,.ts,.tsx

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test